services:
  - type: web
    name: tasued-attendx
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: tasued-attendx
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: tasued-attendx-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true

databases:
  - name: tasued-attendx-db
    databaseName: tasued_attendx
    user: tasued_user
    plan: free